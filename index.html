<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnSona - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --p3-bg: #060b14;
            --p3-blue: #4d9fff;
            --p3-cyan: #00c8ff;
            --p3-white: #e8f0ff;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #0d1b33 0%, #060b14 70%);
            color: var(--p3-white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 32px;
        }
        .logo-container {
            animation: pulseGlow 2s ease-in-out infinite;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #4d9fff, #00c8ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 40px;
            color: #fff;
            clip-path: polygon(10% 0%, 90% 0%, 100% 25%, 100% 75%, 90% 100%, 10% 100%, 0% 75%, 0% 25%);
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(77, 159, 255, 0.6);
        }
        .brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 3px;
            margin-top: 16px;
            background: linear-gradient(180deg, #e8f0ff, #8ea4c2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }
        .subtitle {
            font-size: 14px;
            color: #8ea4c2;
            letter-spacing: 1px;
            text-align: center;
            margin-top: 4px;
        }
        .loading-bar {
            width: 240px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }
        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4d9fff, #00c8ff);
            width: 0%;
            animation: loadingFill 1.5s ease-out forwards;
            border-radius: 2px;
        }
        .loading-text {
            font-size: 12px;
            color: rgba(232, 240, 255, 0.6);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        @keyframes pulseGlow {
            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px rgba(77, 159, 255, 0.4));
            }
            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 25px rgba(0, 200, 255, 0.8));
            }
        }
        @keyframes loadingFill {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }
        .redirect-link {
            font-size: 13px;
            color: var(--p3-cyan);
            text-decoration: none;
            margin-top: 16px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        .redirect-link:hover {
            opacity: 1;
        }
    </style>
    <meta http-equiv="refresh" content="2;url=login.html">
</head>
<body>
    <div class="logo-container">
        <div class="logo-icon">LS</div>
        <div class="brand">LEARNSONA</div>
        <div class="subtitle">AI Early Warning System</div>
    </div>
    <div class="loading-bar">
        <div class="loading-bar-fill"></div>
    </div>
    <div class="loading-text">Menginisialisasi sistem...</div>
    <a href="login.html" class="redirect-link">Klik di sini jika tidak dialihkan otomatis</a>
</body>
</html>
