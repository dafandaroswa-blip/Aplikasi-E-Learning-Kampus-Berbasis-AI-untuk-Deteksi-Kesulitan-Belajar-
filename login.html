<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnSona - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --p3-bg: #060b14;
            --p3-card: #0f1b2e;
            --p3-border: #1e3a5f;
            --p3-blue: #4d9fff;
            --p3-cyan: #00c8ff;
            --p3-white: #e8f0ff;
            --p3-gray: #8ea4c2;
            --p3-red: #ff4d6d;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0d1b33, #060b14 70%);
            color: var(--p3-white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-box {
            background: var(--p3-card);
            border: 1px solid var(--p3-border);
            padding: 40px 36px;
            width: 100%;
            max-width: 400px;
            clip-path: polygon(2% 0%, 100% 0%, 100% 95%, 98% 100%, 0% 100%, 0% 5%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 30px rgba(77,159,255,0.15);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #4d9fff, #00c8ff);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 32px;
            color: #fff;
            clip-path: polygon(10% 0%, 90% 0%, 100% 25%, 100% 75%, 90% 100%, 10% 100%, 0% 75%, 0% 25%);
            margin-bottom: 8px;
            box-shadow: 0 0 20px rgba(0,200,255,0.5);
        }
        .brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 3px;
            background: linear-gradient(180deg, #e8f0ff, #8ea4c2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--p3-gray);
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--p3-border);
            color: var(--p3-white);
            font-size: 15px;
            outline: none;
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 98% 100%, 0% 100%, 0% 15%);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--p3-cyan);
            box-shadow: 0 0 10px rgba(0,200,255,0.3);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4d9fff, #0066cc);
            border: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 17px;
            cursor: pointer;
            clip-path: polygon(2% 0%, 100% 0%, 100% 80%, 98% 100%, 0% 100%, 0% 20%);
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover {
            box-shadow: 0 0 25px rgba(77,159,255,0.6);
            transform: translateY(-1px);
        }
        .error-message {
            color: var(--p3-red);
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            min-height: 20px;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--p3-gray);
        }
        .register-link a {
            color: var(--p3-cyan);
            text-decoration: none;
            font-weight: 600;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-area">
            <div class="logo-icon">LS</div>
            <div class="brand">LEARNSONA</div>
        </div>
        <h2>🔐 LOGIN</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Masukkan email" value="dosen@learnsona.ac.id" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Masukkan password" value="password123" autocomplete="current-password">
        </div>
        <button class="btn-login" onclick="handleLogin()">MASUK</button>
        <div class="error-message" id="errorMsg"></div>
        <div class="register-link">
            Belum punya akun? <a href="register.html">Daftar di sini</a>
        </div>
    </div>

    <script src="lms-core.js"></script>
    <script>
        // Cek apakah user sudah login, langsung redirect
        if (typeof isLoggedIn === 'function' && isLoggedIn()) {
            const user = getCurrentUser();
            if (user && user.role) {
                window.location.href = user.role === 'dosen' ? 'dashboard-dosen.html' : 'dashboard-mahasiswa.html';
            }
        }

        // Fungsi login yang dipanggil tombol
        async function handleLogin() {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                errorEl.textContent = 'Email dan password wajib diisi';
                return;
            }

            try {
                const result = await loginUser(email, password);
                if (result.success) {
                    // Redirect sesuai role
                    window.location.href = result.user.role === 'dosen' ? 'dashboard-dosen.html' : 'dashboard-mahasiswa.html';
                } else {
                    errorEl.textContent = result.error || 'Login gagal';
                }
            } catch (e) {
                console.error('Login error:', e);
                errorEl.textContent = 'Terjadi kesalahan. Coba lagi.';
            }
        }

        // Enter key untuk submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
