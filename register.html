<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnSona - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --p3-bg: #060b14;
            --p3-card: #0f1b2e;
            --p3-border: #1e3a5f;
            --p3-blue: #4d9fff;
            --p3-cyan: #00c8ff;
            --p3-white: #e8f0ff;
            --p3-gray: #8ea4c2;
            --p3-error: #ff4d6d;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 80% 30%, #0d1b33, #060b14 70%);
            color: var(--p3-white);
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .register-box {
            background: var(--p3-card);
            border: 1px solid var(--p3-border);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 30px rgba(77,159,255,0.15), 0 20px 40px rgba(0,0,0,0.6);
            clip-path: polygon(2% 0%, 100% 0%, 100% 95%, 98% 100%, 0% 100%, 0% 5%);
        }
        .logo {
            text-align: center; margin-bottom: 16px;
        }
        .logo-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #4d9fff, #00c8ff);
            display: inline-flex;
            align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900; font-size: 32px;
            color: #fff;
            clip-path: polygon(10% 0%, 90% 0%, 100% 25%, 100% 75%, 90% 100%, 10% 100%, 0% 75%, 0% 25%);
            margin-bottom: 8px;
            box-shadow: 0 0 20px rgba(0,200,255,0.5);
        }
        h2 {
            font-family: 'Orbitron', sans-serif;
            text-align: center; margin-bottom: 24px;
            font-weight: 600; font-size: 22px; letter-spacing: 1px;
        }
        .form-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            color: var(--p3-gray);
            margin-bottom: 6px;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--p3-border);
            color: var(--p3-white);
            font-size: 15px;
            clip-path: polygon(0% 0%, 100% 0%, 100% 85%, 98% 100%, 0% 100%, 0% 15%);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
        }
        input:focus, select:focus {
            border-color: var(--p3-cyan);
            box-shadow: 0 0 10px rgba(0,200,255,0.3);
        }
        select option { background: #0f1b2e; color: #fff; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #4d9fff, #0066cc);
            border: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700; font-size: 17px; letter-spacing: 1px;
            cursor: pointer;
            clip-path: polygon(2% 0%, 100% 0%, 100% 80%, 98% 100%, 0% 100%, 0% 20%);
            margin-top: 8px;
            transition: 0.2s;
        }
        .btn:hover { box-shadow: 0 0 25px rgba(77,159,255,0.6); transform: translateY(-1px); }
        .error {
            color: var(--p3-error); font-size: 13px; text-align: center;
            margin-top: 12px; min-height: 20px;
        }
        .links {
            text-align: center; margin-top: 16px; font-size: 14px; color: var(--p3-gray);
        }
        .links a { color: var(--p3-cyan); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        .info-text {
            text-align: center;
            font-size: 12px;
            color: var(--p3-gray);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="register-box">
        <div class="logo"><div class="logo-icon">LS</div></div>
        <h2>📝 DAFTAR AKUN</h2>
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" id="name" placeholder="Masukkan nama lengkap" autocomplete="name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="Masukkan email" autocomplete="email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Minimal 6 karakter" autocomplete="new-password">
        </div>
        <div class="form-group">
            <label>Daftar Sebagai</label>
            <select id="role">
                <option value="mahasiswa">Mahasiswa</option>
                <option value="dosen">Dosen</option>
            </select>
        </div>
        <button class="btn" onclick="handleRegister()">DAFTAR</button>
        <div class="error" id="errorMsg"></div>
        <div class="info-text">
            Dengan mendaftar, Anda menyetujui <a href="#" style="color:var(--p3-cyan);">Syarat & Ketentuan</a>
        </div>
        <div class="links">
            Sudah punya akun? <a href="login.html">MASUK</a>
        </div>
    </div>

    <script src="lms-core.js"></script>
    <script>
        // Cek apakah user sudah login
        if (typeof isLoggedIn === 'function' && isLoggedIn()) {
            const user = getCurrentUser();
            window.location.href = user.role === 'dosen' ? 'dashboard-dosen.html' : 'dashboard-mahasiswa.html';
        }

        async function handleRegister() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errEl = document.getElementById('errorMsg');
            errEl.textContent = '';

            if (!name || !email || !password) {
                errEl.textContent = 'Semua field wajib diisi.';
                return;
            }
            if (password.length < 6) {
                errEl.textContent = 'Password minimal 6 karakter.';
                return;
            }
            if (!email.includes('@')) {
                errEl.textContent = 'Format email tidak valid.';
                return;
            }

            try {
                const result = await registerUser(email, password, name, role);
                if (result.success) {
                    window.location.href = role === 'dosen' ? 'dashboard-dosen.html' : 'dashboard-mahasiswa.html';
                } else {
                    errEl.textContent = result.error || 'Gagal mendaftar.';
                }
            } catch (e) {
                console.error('Registration error:', e);
                errEl.textContent = 'Terjadi kesalahan. Silakan coba lagi.';
            }
        }

        // Enter key pada form
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleRegister();
            }
        });
    </script>
</body>
</html>
